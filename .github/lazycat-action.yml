version: 1
project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/rundeck.lpk
update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: rundeck
build:
  run_buildscript: false
images:
  - id: rundeck
    target: service
    service: rundeck
    source: rundeck/rundeck
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat
stores:
  official:
    enabled: true
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: Rundeck
    summary: 面向运维和 DevOps 的自动化与 Runbook 平台

